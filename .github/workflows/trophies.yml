name: Generate Trophies

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      # UPGRADE 1: Use your Personal Access Token for full permissions
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.METRICS_TOKEN }}

      - name: Generate Trophy SVG
        uses: Erik-Donath/github-profile-trophy@feature/generate-svg
        with:
          username: Youssef-Amgad-Elkhatib
          theme: aura
          no-frame: true
          margin-w: 15
          row: 2
          column: 4
          output_path: github-trophies.svg
          token: ${{ secrets.METRICS_TOKEN }}

      # UPGRADE 2: Safe commit process that prevents Exit Code 128
      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Update static trophies" || echo "No changes to commit"
          git push origin main
